<!DOCTYPE html>
<html>
<head>
  <title>Offline - DoItWithAI.Tools</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { 
      font-family: Arial, sans-serif; 
      text-align: center; 
      padding: 50px; 
      background: #f5f5f5;
    }
    .offline-container {
      max-width: 400px;
      margin: 0 auto;
    }
    .retry-btn {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      margin: 10px;
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <h1>You're Offline</h1>
    <p>This page isn't available offline yet.</p>
    <button class="retry-btn" onclick="location.reload()">Retry</button>
    <button class="retry-btn" onclick="history.back()">Go Back</button>
  </div>
</body>
</html>
